<script>
document.getElementById('nr').innerText='RC-'+new Date().getFullYear()+'-'+Date.now();

const labels=[];
for(let i=1;i<=8;i++) labels.push('Vor Montage '+i);
for(let i=1;i<=8;i++) labels.push('Nach Montage '+i);

const p=document.getElementById('photos');
labels.forEach(t=>{
 let d=document.createElement('div');
 d.innerHTML='<b>'+t+'</b><input type=file accept=image/*><img class="preview">';
 let inp=d.querySelector('input'), img=d.querySelector('img');
 inp.onchange=e=>img.src=URL.createObjectURL(e.target.files[0]);
 p.appendChild(d);
});

function sign(id){
 let c=document.getElementById(id),x=c.getContext('2d'),d=false;
 c.onmousedown=e=>{d=true;x.beginPath();x.moveTo(e.offsetX,e.offsetY)};
 c.onmousemove=e=>{if(d){x.lineTo(e.offsetX,e.offsetY);x.stroke();}};
